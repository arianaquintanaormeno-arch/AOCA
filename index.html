<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA con Parámetros - Tutor Educativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #131314;
            --bg-sidebar: #1e1f20;
            --accent-color: #744bfa;
            --text-main: #e3e3e3;
            --border-color: #3c4043;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }

        body { background:var(--bg-dark); color:var(--text-main); }

        .hidden { display:none; }

        .dashboard-container { display:flex; height:100vh; }

        .sidebar { width:250px; background:var(--bg-sidebar); padding:20px; }

        .content-area { flex:1; display:flex; flex-direction:column; }

        .workspace { flex:1; padding:20px; overflow:auto; }

        .message { margin:10px 0; padding:10px; border-radius:8px; }

        .user { background:#2b2a2a; text-align:right; }

        .ai { background:#1e1f20; border:1px solid var(--border-color); }

        .input-footer { padding:10px; }

        input { width:80%; padding:10px; }

        button { padding:10px; background:var(--accent-color); color:white; border:none; }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-page">
    <h2>IA Tutor</h2>
    <input id="student-name" placeholder="Tu nombre">
    <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="main-platform" class="dashboard-container hidden">

    <div class="sidebar">
        <h3>IA Tutor</h3>
        <p id="display-username"></p>
    </div>

    <div class="content-area">

        <div class="workspace" id="chat"></div>

        <div class="input-footer">
            <input id="input" placeholder="Escribe aquí...">
            <button onclick="send()">Enviar</button>
        </div>

    </div>
</div>

<script>
const DB = {
    Mathematics: {
        topic: "Álgebra",
        hints: ["Haz la operación inversa", "Despeja la x"],
        questions: ["¿Qué es una ecuación?", "¿Cómo despejas una x?"],
        explanation: "Una ecuación es una igualdad que se mantiene balanceada."
    }
};

let subject = "Mathematics";
let step = 1;
let score = 0;
let nameUser = "";

function login(){
    nameUser = document.getElementById("student-name").value;
    document.getElementById("display-username").innerText = nameUser;
    document.getElementById("login-page").classList.add("hidden");
    document.getElementById("main-platform").classList.remove("hidden");
}

function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    addMsg(nameUser, text, "user");
    input.value = "";

    respond(text);
}

function addMsg(sender, text, type){
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = `<b>${sender}</b><br>${text}`;
    document.getElementById("chat").appendChild(div);
}

function isGood(text){
    text = text.toLowerCase();
    return text.includes("porque") ||
           text.includes("es") ||
           text.includes("x") ||
           text.includes("ecuacion") ||
           text.includes("dividir") ||
           text.includes("multiplicar");
}

function respond(userText){
    const data = DB[subject];
    const good = isGood(userText);

    if(step === 1){
        addMsg("Profesor IA",
            `¡Vamos a pensar juntos!<br>
            Tema: ${data.topic}<br>
            Pregunta: ${data.questions[0]}`,
            "ai"
        );
        step = 2;

    } else if(step === 2){

        if(good){
            score += 10;
            addMsg("Profesor IA",
                `✔️ ¡Bien! Vas entendiendo.<br>
                💡 ${data.hints[0]}<br>
                Pregunta: ${data.questions[1]}`,
                "ai"
            );
        } else {
            addMsg("Profesor IA",
                `⚠️ Intenta otra vez.<br>
                💡 Pista: ${data.hints[0]}`,
                "ai"
            );
        }

        step = 3;

    } else if(step === 3){

        if(good){
            score += 10;
            addMsg("Profesor IA",
                `🔥 ¡Muy bien!<br>
                💡 ${data.hints[1]}<br>
                Explícalo con tus palabras.`,
                "ai"
            );
        } else {
            addMsg("Profesor IA",
                `🤔 Piensa mejor.<br>
                💡 ${data.hints[1]}`,
                "ai"
            );
        }

        step = 4;

    } else {

        if(good){
            score += 20;
            addMsg("Profesor IA",
                `🎉 ¡BRILLANTE!<br>
                ${data.explanation}`,
                "ai"
            );
        } else {
            addMsg("Profesor IA",
                `📖 ${data.explanation}`,
                "ai"
            );
        }

        step = 1;
    }
}
</script>

</body>
</html>
