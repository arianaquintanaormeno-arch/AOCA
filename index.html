<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA con Parámetros - Tutor Educativo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --bg-dark:#131314;
    --bg-sidebar:#1e1f20;
    --accent-color:#744bfa;
    --text-main:#e3e3e3;
    --border-color:#3c4043;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:var(--bg-dark);color:var(--text-main);}

.hidden{display:none;}

.dashboard-container{display:flex;height:100vh;}

.sidebar{width:260px;background:var(--bg-sidebar);padding:20px;}

.content-area{flex:1;display:flex;flex-direction:column;}

.workspace{flex:1;padding:20px;overflow:auto;}

.message{padding:10px;margin:8px 0;border-radius:8px;}
.user{background:#2b2a2a;text-align:right;}
.ai{background:#1e1f20;border:1px solid var(--border-color);}

input{padding:10px;width:80%;}
button{padding:10px;background:var(--accent-color);color:white;border:none;cursor:pointer;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-page">
    <h2>IA Tutor</h2>
    <input id="student-name" placeholder="Tu nombre">
    <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="main-platform" class="dashboard-container hidden">

<div class="sidebar">
    <h3>IA Tutor</h3>
    <p id="display-username"></p>
</div>

<div class="content-area">

<div class="workspace" id="chat"></div>

<div>
    <input id="input" placeholder="Escribe aquí...">
    <button onclick="send()">Enviar</button>
</div>

</div>

</div>

<script>

/* =========================
   BASE DE CONOCIMIENTO
========================= */

const DB = {
    English: {
        present_simple: {
            keywords:["habit","routine","every day","s","always"],
            explanation:"Present simple is used for habits and routines.",
            hint:"He/She/It adds 's' to verbs."
        },
        future_will: {
            keywords:["future","will","prediction","promise","tomorrow"],
            explanation:"Will is used for future actions and predictions.",
            hint:"Will + verb base form."
        }
    }
};

let step = 1;
let topic = "future_will";
let nameUser = "";

/* =========================
   LOGIN
========================= */

function login(){
    nameUser = document.getElementById("student-name").value;
    document.getElementById("display-username").innerText = nameUser;

    document.getElementById("login-page").classList.add("hidden");
    document.getElementById("main-platform").classList.remove("hidden");
}

/* =========================
   CHAT UI
========================= */

function addMsg(sender,text,type){
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = `<b>${sender}</b><br>${text}`;
    document.getElementById("chat").appendChild(div);
}

/* =========================
   DETECCIÓN INTELIGENTE
========================= */

function isGoodAnswer(text, keywords){
    text = text.toLowerCase();
    let score = 0;

    for(let k of keywords){
        if(text.includes(k)) score++;
    }

    return score >= 1;
}

function isEmpty(text){
    return text.trim().length < 2;
}

/* =========================
   RESPUESTA IA
========================= */

function send(){

    const input = document.getElementById("input");
    const text = input.value.trim();
    input.value = "";

    addMsg(nameUser,text,"user");

    const data = DB.English[topic];

    if(step === 1){
        addMsg("Profesor IA",
        "📘 Explica con tus palabras: " + topic,
        "ai");
        step = 2;
        return;
    }

    if(step === 2){

        if(isEmpty(text)){
            addMsg("Profesor IA","⚠️ Escribe algo más completo.","ai");
            return;
        }

        if(isGoodAnswer(text,data.keywords)){
            addMsg("Profesor IA",
            "✔️ Bien! " + data.hint + "<br>Ahora mejora tu respuesta.",
            "ai");
        } else {
            addMsg("Profesor IA",
            "❌ No es correcto todavía.<br>💡 " + data.hint,
            "ai");
        }

        step = 3;
        return;
    }

    if(step === 3){

        if(isGoodAnswer(text,data.keywords)){
            addMsg("Profesor IA",
            "🔥 Excelente!<br>" + data.explanation,
            "ai");
        } else {
            addMsg("Profesor IA",
            "🤔 Intenta otra vez.<br>" + data.hint,
            "ai");
        }

        step = 1;
        return;
    }
}

</script>

</body>
</html>
